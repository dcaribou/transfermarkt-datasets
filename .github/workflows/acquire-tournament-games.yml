name: acquire-tournament-games

on:
  workflow_dispatch:

jobs:
  acquire-tournament-games:
    runs-on: ubuntu-latest
    container:
      image: dcaribou/transfermarkt-datasets:linux-amd64-master
    defaults:
      run:
        shell: bash -l {0}
    steps:
      - uses: actions/checkout@v4
      - name: run acquire
        run: |
          just acquire_local --asset tournament_games
      - uses: actions/upload-artifact@v4
        with:
          name: tournament_games
          path: data/raw/transfermarkt-scraper/

  dvc-push:
    runs-on: ubuntu-latest
    container:
      image: dcaribou/transfermarkt-datasets:linux-amd64-master
    defaults:
      run:
        shell: bash -l {0}
    needs: acquire-tournament-games
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.PA_GITHUB_TOKEN }}
      - name: pull data
        run: |
          dvc pull
      - uses: actions/download-artifact@v4
        with:
          name: tournament_games
          path: data/raw/transfermarkt-scraper
      - name: dvc commit and push
        run: |
          set -e
          dvc commit -f && dvc push --remote r2
          git config --global --add safe.directory '*'
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
      - uses: EndBug/add-and-commit@v9
        with:
          add: 'data/raw/transfermarkt-scraper.dvc'
          message: '🤖 updated tournament games raw data'
          default_author: github_actions
          pull: '--no-rebase'
